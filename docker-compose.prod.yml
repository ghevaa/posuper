services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pos-yoga-api-prod
    restart: unless-stopped
    networks:
      - dokploy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pos-yoga-api.rule=Host(`api.72.61.214.92.sslip.io`)"
      - "traefik.http.routers.pos-yoga-api.entrypoints=web"
      - "traefik.http.services.pos-yoga-api.loadbalancer.server.port=3000"
    environment:
      - DATABASE_URL=postgresql://postgres:posyogaprodpassword2024@postgres:5432/pos_yoga
      - PORT=3000
      - HOST=0.0.0.0
      - BETTER_AUTH_SECRET=8d4f9b8c5e2a1d0f7b6c3e9a0d8f7e6c5b4a3f2e1d0c9b8a7f6e5d4c3b2a1f0e
      - BETTER_AUTH_URL=http://api.72.61.214.92.sslip.io
      - CORS_ORIGIN=http://api.72.61.214.92.sslip.io,http://72.61.214.92,tauri://localhost,http://tauri.localhost
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: pos-yoga-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: posyogaprodpassword2024
      POSTGRES_DB: pos_yoga
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pos-yoga-redis-prod
    restart: unless-stopped
    volumes:
      - redis_prod_data:/data

  # Automated DB Backup service
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: pos-yoga-db-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=pos_yoga
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=posyogaprodpassword2024
      - BACKUP_NUM_KEEP=7
      - BACKUP_FREQUENCY=1d
    volumes:
      - ./backups:/backups
    depends_on:
      - postgres

networks:
  dokploy-network:
    external: true

volumes:
  postgres_prod_data:
  redis_prod_data:
